# Automatically approves pull requests from trusted authors (Copilot bot and
# repo owner) and unblocks their pending workflow runs.
#
# Uses pull_request_target so this workflow always runs from the base-branch
# (main) context and therefore never itself requires a workflow-run approval.

name: Auto approve

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Approve trusted PRs
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR and unblock workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const trustedActors = new Set([
              'living-relation',
              'Copilot',
              'copilot-swe-agent[bot]',
            ]);

            const actor = context.payload.pull_request.user.login;
            if (!trustedActors.has(actor)) {
              core.info(`Actor "${actor}" is not in the trusted list; skipping auto-approve.`);
              return;
            }

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const headSha  = context.payload.pull_request.head.sha;

            // 1. Approve any workflow runs that are pending manual approval.
            const { data: runsPage } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: headSha,
              per_page: 100,
            });
            for (const run of runsPage.workflow_runs) {
              if (run.status === 'action_required') {
                try {
                  await github.rest.actions.approveWorkflowRun({ owner, repo, run_id: run.id });
                  core.info(`Approved workflow run ${run.id} ("${run.name}")`);
                } catch (e) {
                  core.warning(`Could not approve run ${run.id}: ${e.message}`);
                }
              }
            }

            // 2. Convert draft PR to ready-for-review so auto-merge can proceed.
            if (context.payload.pull_request.draft) {
              try {
                await github.rest.pulls.update({ owner, repo, pull_number: prNumber, draft: false });
                core.info('Marked PR as ready for review.');
              } catch (e) {
                core.warning(`Could not un-draft PR: ${e.message}`);
              }
            }

            // 3. Submit an APPROVE review on behalf of github-actions[bot].
            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: `Auto-approved: trusted author @${actor}.`,
              });
              core.info('Submitted APPROVE review.');
            } catch (e) {
              core.warning(`Could not approve PR: ${e.message}`);
            }
