name: Delete merged branches

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = preview only, false = actually delete)"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-pr-branch:
    name: Delete PR head branch on merge
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged PR branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              // Get the branch SHA before deletion for archive tag
              const { data: ref } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              const branchSha = ref.object.sha;

              // Create archive tag before deletion (as per BRANCH_GOVERNANCE.md policy)
              const timestamp = new Date().toISOString().replace(/[:.]/g, '').replace(/-/g, '').slice(0, 15) + 'Z';
              const sanitizedBranch = branch.replace(/\//g, '-');
              const tagName = `archive/deleted-branches/${timestamp}/${sanitizedBranch}`;

              try {
                await github.rest.git.createTag({
                  owner,
                  repo,
                  tag: tagName,
                  message: `Archive of deleted branch '${branch}' (merged PR #${context.payload.pull_request.number})`,
                  object: branchSha,
                  type: 'commit',
                });

                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tagName}`,
                  sha: branchSha,
                });

                core.info(`Created archive tag: ${tagName}`);
              } catch (tagError) {
                core.warning(`Could not create archive tag ${tagName}: ${tagError.message}`);
              }

              // Now delete the branch
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (error) {
              core.warning(`Could not delete branch ${branch}: ${error.message}`);
            }

  cleanup-merged-branches:
    name: Delete all merged branches
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged branches
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Collect all non-default branches
            const { execSync } = require('child_process');

            // Fetch all remote refs
            execSync('git fetch --all --prune', { stdio: 'inherit' });

            const defaultBranch = 'main';
            const protectedPatterns = [/^main$/, /^master$/, /^develop$/, /^release\//, /^hotfix\//, /^support\//, /^recovery\//, /^archive\//];

            function isProtected(branch) {
              return protectedPatterns.some(p => p.test(branch));
            }

            // Get all remote branches
            const remoteBranches = execSync("git for-each-ref --format='%(refname:short)' refs/remotes/origin")
              .toString()
              .trim()
              .split('\n')
              .map(b => b.replace(/^origin\//, ''))
              .filter(b => b && b !== 'HEAD');

            const toDelete = [];

            for (const branch of remoteBranches) {
              if (isProtected(branch)) {
                core.info(`Skipping protected branch: ${branch}`);
                continue;
              }

              // Check if merged via git ancestry
              let isMerged = false;
              try {
                execSync(`git merge-base --is-ancestor "origin/${branch}" "origin/${defaultBranch}"`, { stdio: 'pipe' });
                isMerged = true;
                core.info(`${branch}: merged (git ancestry)`);
              } catch (_) {
                core.info(`${branch}: not merged via git ancestry, checking PRs...`);
              }

              // Also check if there is a merged PR for this branch (handles squash/rebase merges)
              if (!isMerged) {
                try {
                  const { data: prs } = await github.rest.pulls.list({
                    owner,
                    repo,
                    head: `${owner}:${branch}`,
                    state: 'closed',
                    per_page: 5,
                  });
                  isMerged = prs.some(pr => pr.merged_at !== null && pr.base.ref === defaultBranch);
                } catch (_) {}
              }

              if (isMerged) {
                toDelete.push(branch);
              }
            }

            core.info(`\nBranches to delete (${toDelete.length}):`);
            for (const branch of toDelete) {
              core.info(`  - ${branch}`);
            }

            if (dryRun) {
              core.info('\nDry-run mode: no branches were deleted.');
              return;
            }

            let deleted = 0;
            let failed = 0;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '').replace(/-/g, '').slice(0, 15) + 'Z';

            for (const branch of toDelete) {
              try {
                // Get the branch SHA before deletion for archive tag
                const { data: ref } = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                const branchSha = ref.object.sha;

                // Create archive tag before deletion (as per BRANCH_GOVERNANCE.md policy)
                const sanitizedBranch = branch.replace(/\//g, '-');
                const tagName = `archive/deleted-branches/${timestamp}/${sanitizedBranch}`;

                try {
                  await github.rest.git.createTag({
                    owner,
                    repo,
                    tag: tagName,
                    message: `Archive of deleted branch '${branch}' (bulk cleanup)`,
                    object: branchSha,
                    type: 'commit',
                  });

                  await github.rest.git.createRef({
                    owner,
                    repo,
                    ref: `refs/tags/${tagName}`,
                    sha: branchSha,
                  });

                  core.info(`Created archive tag: ${tagName}`);
                } catch (tagError) {
                  core.warning(`Could not create archive tag ${tagName}: ${tagError.message}`);
                }

                // Now delete the branch
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                core.info(`Deleted: ${branch}`);
                deleted++;
              } catch (error) {
                core.warning(`Failed to delete ${branch}: ${error.message}`);
                failed++;
              }
            }

            core.info(`\nSummary: ${deleted} deleted, ${failed} failed.`);
