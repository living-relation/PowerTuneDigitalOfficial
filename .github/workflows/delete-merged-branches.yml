name: Delete merged branches

env:
  ALLOW_BRANCH_DELETE: "false"

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = preview only, false = actually delete)"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-pr-branch:
    name: Delete PR head branch on merge
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      env.ALLOW_BRANCH_DELETE == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged PR branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip fork PRs — head.repo is the contributor's fork, not this repo.
            // Deleting heads/${branch} here would silently remove a same-named branch
            // in the base repo instead of the fork branch.
            if (pr.head.repo && pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.info(`Skipping fork PR branch: ${branch} (from ${pr.head.repo.full_name})`);
              return;
            }

            // Protected-branch rules — same set used by the manual cleanup job.
            const protectedPatterns = [
              /^main$/, /^master$/, /^develop$/,
              /^release\//, /^hotfix\//, /^support\//,
              /^recovery\//, /^archive\//,
            ];
            if (protectedPatterns.some(p => p.test(branch))) {
              core.info(`Skipping protected branch: ${branch}`);
              return;
            }

            // Create archive tag before deletion so the tip is always recoverable.
            const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
            const tagName = `archive/deleted-branches/${timestamp}/${branch.replace(/\//g, '-')}`;
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              const tagExists = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tagName}`,
              }).then(() => true).catch(() => false);
              if (!tagExists) {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tagName}`,
                  sha: ref.object.sha,
                });
                core.info(`Created archive tag: ${tagName}`);
              } else {
                core.info(`Archive tag already exists: ${tagName}`);
              }
            } catch (error) {
              core.warning(`Could not create archive tag ${tagName}: ${error.message}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (error) {
              core.warning(`Could not delete branch ${branch}: ${error.message}`);
            }

  cleanup-merged-branches:
    name: Delete all merged branches
    if: >-
      github.event_name == 'workflow_dispatch' &&
      env.ALLOW_BRANCH_DELETE == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged branches
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { execSync } = require('child_process');
            execSync('git fetch --all --prune', { stdio: 'inherit' });

            const defaultBranch = 'main';
            const protectedPatterns = [
              /^main$/, /^master$/, /^develop$/,
              /^release\//, /^hotfix\//, /^support\//,
              /^recovery\//, /^archive\//,
            ];

            function isProtected(branch) {
              return protectedPatterns.some(p => p.test(branch));
            }

            const remoteBranches = execSync(
              "git for-each-ref --format='%(refname:short)' refs/remotes/origin"
            )
              .toString()
              .trim()
              .split('\n')
              .map(b => b.replace(/^origin\//, ''))
              .filter(b => b && b !== 'HEAD');

            const toDelete = [];

            for (const branch of remoteBranches) {
              if (isProtected(branch)) {
                core.info(`Skipping protected branch: ${branch}`);
                continue;
              }

              // Check merged via git ancestry (handles regular merges)
              let isMerged = false;
              try {
                execSync(
                  `git merge-base --is-ancestor "origin/${branch}" "origin/${defaultBranch}"`,
                  { stdio: 'pipe' }
                );
                isMerged = true;
                core.info(`${branch}: merged (git ancestry)`);
              } catch (_) {
                core.info(`${branch}: not merged via git ancestry, checking PRs...`);
              }

              // Also check via closed PRs (handles squash/rebase merges)
              if (!isMerged) {
                try {
                  const { data: prs } = await github.rest.pulls.list({
                    owner,
                    repo,
                    head: `${owner}:${branch}`,
                    state: 'closed',
                    per_page: 5,
                  });
                  isMerged = prs.some(
                    pr => pr.merged_at !== null && pr.base.ref === defaultBranch
                  );
                } catch (_) {}
              }

              if (isMerged) {
                toDelete.push(branch);
              }
            }

            core.info(`\nBranches to delete (${toDelete.length}):`);
            for (const branch of toDelete) {
              core.info(`  - ${branch}`);
            }

            if (dryRun) {
              core.info('\nDry-run mode: no branches were deleted.');
              return;
            }

            // Shared timestamp so all tags from this run share the same prefix.
            const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');

            let deleted = 0;
            let failed = 0;
            for (const branch of toDelete) {
              // Archive the branch tip before deletion so it is always recoverable.
              const tagName = `archive/deleted-branches/${timestamp}/${branch.replace(/\//g, '-')}`;
              try {
                const { data: ref } = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                const tagExists = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `tags/${tagName}`,
                }).then(() => true).catch(() => false);
                if (!tagExists) {
                  await github.rest.git.createRef({
                    owner,
                    repo,
                    ref: `refs/tags/${tagName}`,
                    sha: ref.object.sha,
                  });
                  core.info(`Archived: ${tagName}`);
                } else {
                  core.info(`Archive tag already exists: ${tagName}`);
                }
              } catch (error) {
                core.warning(`Could not archive ${branch}: ${error.message}`);
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                core.info(`Deleted: ${branch}`);
                deleted++;
              } catch (error) {
                core.warning(`Failed to delete ${branch}: ${error.message}`);
                failed++;
              }
            }

            core.info(`\nSummary: ${deleted} deleted, ${failed} failed.`);
