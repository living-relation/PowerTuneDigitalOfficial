name: Enable PR auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge on this PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            const pullRequestNumber = context.payload.pull_request.number;

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId },
              );

              core.info(`Enabled auto-merge for PR #${pullRequestNumber}.`);
            } catch (error) {
              // Ignore already-enabled or temporarily ineligible PRs and retry on the next event.
              core.warning(
                `Could not enable auto-merge for PR #${pullRequestNumber}: ${error.message}`,
              );
            }
